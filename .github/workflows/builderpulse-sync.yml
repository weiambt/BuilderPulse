name: BuilderPulse Sync

on:
  schedule:
    # UTC 3:00 = 北京时间 11:00
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Get stored commit SHA
        id: last_commit
        run: |
          if [[ -n "${{ secrets.BUILDERPULSE_LAST_COMMIT }}" ]]; then
            echo "last=${{ secrets.BUILDERPULSE_LAST_COMMIT }}" >> $GITHUB_OUTPUT
          else
            echo "last=" >> $GITHUB_OUTPUT
          fi

      - name: Fetch latest commit SHA
        id: latest_commit
        run: |
          response=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/BuilderPulse/BuilderPulse/commits?per_page=1")
          latest_sha=$(echo "$response" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['sha'] if d else '')")
          echo "sha=$latest_sha" >> $GITHUB_OUTPUT
          echo "sha=$latest_sha"

      - name: Sync to Lark
        if: steps.last_commit.outputs.last != steps.latest_commit.outputs.sha
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
        run: |
          pip install requests -q

          python3 << 'PYEOF'
          import os
          import base64
          import requests
          from datetime import datetime

          github_token = os.environ.get('GITHUB_TOKEN', '')
          lark_app_id = os.environ.get('LARK_APP_ID', '')
          lark_app_secret = os.environ.get('LARK_APP_SECRET', '')

          headers = {
              'Authorization': f'token {github_token}',
              'Accept': 'application/vnd.github.v3+json'
          }

          # 获取根目录文件列表
          resp = requests.get(
              'https://api.github.com/repos/BuilderPulse/BuilderPulse/contents/',
              headers=headers
          )
          files = resp.json() if isinstance(resp.json(), list) else []

          changes = []
          for f in files:
              if f.get('type') == 'file':
                  file_resp = requests.get(f['url'], headers=headers)
                  file_data = file_resp.json()
                  if 'content' in file_data:
                      content = base64.b64decode(file_data['content']).decode('utf-8', errors='ignore')
                      changes.append({
                          'name': f['name'],
                          'path': f['path'],
                          'sha': f['sha'],
                          'size': f['size'],
                          'content_preview': content[:500] if len(content) > 500 else content
                      })

          # 获取最新 commit SHA
          commit_resp = requests.get(
              'https://api.github.com/repos/BuilderPulse/BuilderPulse/commits?per_page=1',
              headers=headers
          )
          commits = commit_resp.json()
          latest_sha = commits[0]['sha'] if commits else ''
          latest_sha_short = latest_sha[:8]

          # 获取 Lark token
          lark_token_resp = requests.post(
              'https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal',
              json={'app_id': lark_app_id, 'app_secret': lark_app_secret}
          )
          lark_token = lark_token_resp.json().get('tenant_access_token', '')

          # 创建飞书文档 (使用新 docx API)
          doc_title = f"BuilderPulse 变更报告 - {datetime.now().strftime('%Y-%m-%d')}"
          doc_resp = requests.post(
              'https://open.feishu.cn/open-apis/docx/v1/documents',
              headers={'Authorization': f'Bearer {lark_token}', 'Content-Type': 'application/json'},
              json={'title': doc_title}
          )
          doc_data = doc_resp.json()
          doc_token = doc_data.get('data', {}).get('document', {}).get('document_id', '')

          if doc_token:
              # 构建文档内容
              blocks = []
              blocks.append({
                  'block_type': 2,  # heading1
                  'heading1': {
                      'elements': [{'type': 'text_run', 'text_run': {'content': f'BuilderPulse 变更报告 - {datetime.now().strftime("%Y-%m-%d")}'}}],
                      'style': {}
                  }
              })
              blocks.append({
                  'block_type': 1,  # text
                  'text': {
                      'elements': [{'type': 'text_run', 'text_run': {'content': f'检测到变更！共 {len(changes)} 个文件。\n最新 Commit: {latest_sha_short}'}}],
                      'style': {}
                  }
              })
              blocks.append({
                  'block_type': 3,  # heading2
                  'heading2': {
                      'elements': [{'type': 'text_run', 'text_run': {'content': '文件变更列表'}}],
                      'style': {}
                  }
              })

              for change in changes:
                  blocks.append({
                      'block_type': 4,  # heading3
                      'heading3': {
                          'elements': [{'type': 'text_run', 'text_run': {'content': change['name']}}],
                          'style': {}
                      }
                  })
                  blocks.append({
                      'block_type': 1,
                      'text': {
                          'elements': [{'type': 'text_run', 'text_run': {'content': f"路径: {change['path']} | 大小: {change['size']} bytes"}}],
                          'style': {}
                      }
                  })
                  if change['content_preview']:
                      blocks.append({
                          'block_type': 1,
                          'text': {
                              'elements': [{'type': 'text_run', 'text_run': {'content': change['content_preview']}}],
                              'style': {}
                          }
                      })

              # 插入文档内容块
              if blocks:
                  requests.patch(
                      f'https://open.feishu.cn/open-apis/docx/v1/documents/{doc_token}/blocks/{doc_token}/children',
                      headers={'Authorization': f'Bearer {lark_token}', 'Content-Type': 'application/json'},
                      json={'children': blocks, 'index': -1}
                  )

              print(f"文档已创建: https://bytedance.feishu.cn/docx/{doc_token}")
              print(f"FILES_COUNT={len(changes)}")
              print(f"DOC_TOKEN={doc_token}")
          else:
              print(f"文档创建失败: {doc_data}")
          PYEOF

      - name: No changes detected
        if: steps.last_commit.outputs.last == steps.latest_commit.outputs.sha
        run: echo "No new changes detected."